name: Build and Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 如果未来需要在 CI 里强制跑通测试，可以解除这段注释
      # - name: Run Persona Tests
      #   env:
      #     SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
      #   run: python scripts/test_persona.py

      - name: Build Release Artifacts (First Pass)
        run: python scripts/build_release.py

      - name: Save Checksums
        run: cp release/checksums.json /tmp/checksums1.json

      - name: Clean Release Directory
        run: rm -rf release/

      - name: Build Release Artifacts (Second Pass - Determinism Check)
        run: python scripts/build_release.py

      - name: Verify Deterministic Build
        run: |
          cp release/checksums.json /tmp/checksums2.json
          diff /tmp/checksums1.json /tmp/checksums2.json || { echo "❌ 灾难性错误：构建不具备确定性 (Non-deterministic build detected)!"; exit 1; }
          echo "✅ 可复现构建校验通过 (Deterministic build verified)!"

      - name: Prepare README for Release Branch
        run: |
          cat << 'EOF' > release/README.md
          # 小饭数字分身 (Xiaofan Digital Clone) - 开箱即用版
          
          这是已编译打包完成的**最终交付产物 (Release)**。
          任何人 Clone 本仓库的默认 release 分支后，可以直接拿走使用。
          
          ## 📦 产物列表
          
          - 🤖 **Agent 开发**：去 `openai/` / `crewai/` / `autogen/` 获取框架配置。
          - 🗣️ **纯享版**：去 `standard_prompt/` 复制文本，扔给 ChatGPT。
          - 🌐 **知识库**：去 `knowledge_base/` 下载 Markdown 导入 Dify / Coze。
          - ⚡ **Antigravity 原生支持**：本分支已自带 `simulating-xiaofan/` 技能目录。直接将该目录复制到你的 `~/.gemini/config/skills/` 下即可！
          
          ---
          
          > ⚠️ **开发者注意 (For Developers)** 
          > 当前的 `release` 分支**仅包含**由脚本编译后的“死产物”，用于对外分发。
          > 如果你需要查看和修改底层源码（如 `persona/` 模块）、增加测试集或是维护 API 测试脚本，**请务必切换到 `main` 分支**：
          > 
          > ```bash
          > git checkout main
          > ```
          EOF

      - name: Deploy to Release Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: release
          publish_dir: ./release
          force_orphan: false
          commit_message: "chore(release): auto-deployed from main branch [skip ci]"
